<!DOCTYPE html>
<html lang="ja">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1">
<title>バスで覚える英熟語</title>
<style>
*{box-sizing:border-box;margin:0;padding:0}
body{font-family:-apple-system,BlinkMacSystemFont,'Hiragino Sans','Meiryo',sans-serif;background:#f5f5f0;color:#1a1a18;min-height:100vh}
#app{max-width:680px;margin:0 auto;padding:1rem}
.scr{display:none}.scr.on{display:block}

/* ── LOGIN ── */
.login-wrap{max-width:360px;margin:3rem auto;background:#fff;border:1px solid #e5e5e0;border-radius:16px;padding:2rem}
.login-wrap h2{font-size:18px;font-weight:600;color:#1a1a18;margin-bottom:4px}
.login-wrap p{font-size:13px;color:#888;margin-bottom:1.5rem}
.field{margin-bottom:1rem}
.field label{display:block;font-size:12px;font-weight:500;color:#555;margin-bottom:4px}
.field input{width:100%;padding:.6rem .8rem;border:1px solid #ddd;border-radius:8px;font-size:14px;font-family:inherit;outline:none}
.field input:focus{border-color:#6366f1}
.login-btn{width:100%;padding:.7rem;background:#6366f1;color:#fff;border:none;border-radius:8px;font-size:14px;font-weight:500;cursor:pointer;font-family:inherit}
.login-btn:hover{background:#4f46e5}
.login-err{font-size:12px;color:#e11d48;margin-top:.5rem;display:none}

/* ── HOME ── */
.home-hd{text-align:center;padding:1.25rem 0 .75rem}
.home-hd h1{font-size:20px;font-weight:600;color:#1a1a18}
.home-hd .student-name{font-size:13px;color:#6366f1;margin-top:3px;font-weight:500}
.gbadge{display:inline-flex;align-items:center;gap:6px;margin-top:7px;padding:4px 14px;border-radius:20px;font-size:12px;font-weight:500;border:1px solid}
.gb0{background:#f5f5f0;color:#888;border-color:#e5e5e0}
.gb1{background:#edfaf3;color:#1a7a45;border-color:#b0e8c8}
.gb2{background:#f0eaff;color:#6b21a8;border-color:#d4b8f8}
.sync-row{text-align:center;margin-bottom:.5rem}
.sync-btn{font-size:11px;color:#aaa;background:none;border:none;cursor:pointer;padding:2px 8px}
.sync-btn:hover{color:#6366f1}
.sync-status{font-size:11px;color:#aaa;margin-left:6px}

.stage-list{display:flex;flex-direction:column;gap:8px;margin:.75rem 0}
.strow{background:#fff;border:1px solid #e5e5e0;border-radius:12px;padding:.85rem 1rem;cursor:pointer;transition:border-color .15s;display:flex;align-items:center;gap:11px}
.strow:hover:not(.locked){border-color:#aaa}
.strow.locked{opacity:.5;cursor:default}
.strow.conf{border-color:#6ee7a0}
.st-ic{width:34px;height:34px;border-radius:50%;display:flex;align-items:center;justify-content:center;font-size:14px;font-weight:600;flex-shrink:0}
.ic-done{background:#edfaf3;color:#1a7a45}
.ic-act{background:#eef2ff;color:#3730a3}
.ic-lock{background:#f5f5f0;color:#aaa}
.st-bd{flex:1;min-width:0}
.st-name{font-size:14px;font-weight:600;color:#1a1a18}
.st-sub{font-size:11px;color:#888;margin-top:1px}
.st-bar{height:4px;background:#e8e8e2;border-radius:2px;margin-top:5px;overflow:hidden}
.st-fill{height:100%;border-radius:2px;background:#34d074;transition:width .3s}
.st-tag{font-size:11px;padding:2px 8px;border-radius:10px;flex-shrink:0;font-weight:500}
.tag-m{background:#edfaf3;color:#1a7a45}
.tag-p{background:#fef9ec;color:#92400e;border:1px solid #fde68a}
.tag-u{background:#f5f5f0;color:#888;border:1px solid #e5e5e0}

.fbox{background:#fff;border:1px solid #c7d7fe;border-radius:12px;padding:.9rem 1rem;margin-top:.5rem}
.fbox h3{font-size:14px;font-weight:600;color:#1a1a18;margin-bottom:4px}
.fbox p{font-size:12px;color:#555;line-height:1.6;margin-bottom:8px}
.fbtn{padding:.45rem 1rem;border-radius:8px;border:1px solid #6366f1;background:#eef2ff;color:#3730a3;font-size:13px;cursor:pointer;font-family:inherit;font-weight:500}
.fbtn:hover{background:#e0e7ff}
.fbtn:disabled{opacity:.4;cursor:default}

/* ── STAGE ── */
.back-btn{font-size:13px;color:#666;cursor:pointer;margin-bottom:.85rem;display:inline-flex;align-items:center;gap:4px;background:none;border:none;padding:0}
.back-btn:hover{color:#1a1a18}
.sv-hd{margin-bottom:.8rem}
.sv-hd h2{font-size:17px;font-weight:600;color:#1a1a18}
.sv-hd p{font-size:12px;color:#888;margin-top:2px}
.cfg-row{display:flex;align-items:center;gap:8px;flex-wrap:wrap;margin-bottom:.7rem}
.cfg-lbl{font-size:12px;color:#666;min-width:60px}
.seg{display:flex;gap:3px}
.sb{padding:4px 11px;border-radius:7px;border:1px solid #ddd;background:#fff;font-size:12px;color:#666;cursor:pointer;font-family:inherit}
.sb.on{background:#eef2ff;color:#3730a3;border-color:#6366f1;font-weight:500}
.sb:hover:not(.on){border-color:#aaa}
.stat-row{display:flex;gap:7px;margin-bottom:.8rem;flex-wrap:wrap;align-items:center}
.chip{padding:3px 10px;border-radius:10px;font-size:12px;font-weight:500}
.ch-m{background:#edfaf3;color:#1a7a45}
.ch-c{background:#fef9ec;color:#92400e}
.ch-u{background:#f5f5f0;color:#666;border:1px solid #e5e5e0}
.mode-grid{display:grid;grid-template-columns:repeat(3,1fr);gap:7px;margin-bottom:.7rem}
.mbtn{background:#fff;border:1px solid #e5e5e0;border-radius:8px;padding:.6rem .8rem;cursor:pointer;text-align:left;font-family:inherit}
.mbtn:hover:not(:disabled){border-color:#aaa}
.mbtn:disabled{opacity:.4;cursor:default}
.mb-t{font-size:13px;font-weight:500;color:#1a1a18}
.mb-s{font-size:11px;color:#888;margin-top:2px}
.cbox{background:#fff;border:1px solid #c7d7fe;border-radius:8px;padding:.8rem .9rem}
.cbox h4{font-size:13px;font-weight:600;color:#1a1a18;margin-bottom:3px}
.cbox p{font-size:12px;color:#555;margin-bottom:8px;line-height:1.5}
.cbtn{padding:.38rem .85rem;border-radius:8px;border:1px solid #6366f1;background:#eef2ff;color:#3730a3;font-size:12px;cursor:pointer;font-family:inherit;font-weight:500}

/* ── QUIZ ── */
.qv-top{display:flex;justify-content:space-between;align-items:center;margin-bottom:.55rem}
.qv-info{font-size:13px;color:#666}
.tw{display:flex;align-items:center;gap:5px}
.tring{width:32px;height:32px}
.tnum{font-size:18px;font-weight:600;min-width:22px;text-align:center;color:#3730a3}
.qbar{height:3px;background:#e8e8e2;border-radius:2px;margin-bottom:.9rem;overflow:hidden}
.qbarf{height:100%;border-radius:2px;background:#6366f1;transition:width .25s}
.qcard{background:#fff;border:1px solid #e5e5e0;border-radius:12px;padding:1.2rem;margin-bottom:.85rem}
.qno{font-size:11px;color:#aaa;margin-bottom:3px}
.qidiom{font-size:20px;font-weight:600;color:#1a1a18;line-height:1.3}
.qcat{font-size:11px;color:#aaa;margin-top:3px}
.choices{display:grid;grid-template-columns:1fr 1fr;gap:6px}
.cb{background:#fff;border:1px solid #e5e5e0;border-radius:8px;padding:.65rem .8rem;cursor:pointer;text-align:left;font-size:13px;color:#1a1a18;font-family:inherit;line-height:1.5;transition:border-color .1s,background .1s}
.cb:hover:not(:disabled){border-color:#aaa;background:#fafafa}
.cb.ok{border-color:#34d074!important;background:#edfaf3!important;color:#1a7a45!important}
.cb.ng{border-color:#f87171!important;background:#fef2f2!important;color:#b91c1c!important}
.cb.to{border-color:#fbbf24!important;background:#fef9ec!important}
.cb:disabled{cursor:default}
.clbl{font-size:10px;font-weight:600;color:#aaa;display:block;margin-bottom:2px}
.exbox{background:#f8f8f4;border-radius:8px;padding:.65rem .8rem;margin-top:.8rem;font-size:12px;color:#555;line-height:1.6;display:none}
.exen{color:#1a1a18;font-weight:500;margin-bottom:2px}
.nxtbtn{width:100%;padding:.65rem;background:#fff;border:1px solid #ccc;border-radius:8px;cursor:pointer;font-size:14px;font-weight:500;color:#1a1a18;font-family:inherit;margin-top:.75rem}
.nxtbtn:hover{background:#f5f5f0}
.nxtbtn:disabled{opacity:.35;cursor:default}

/* ── RESULT ── */
.rcard{background:#fff;border:1px solid #e5e5e0;border-radius:12px;padding:1.4rem;text-align:center;margin:.85rem 0}
.rbig{font-size:46px;font-weight:700;color:#1a1a18}
.rden{font-size:17px;color:#888}
.rmsg{font-size:13px;color:#555;margin-top:.35rem;line-height:1.5}
.rstats{display:flex;justify-content:center;gap:1.2rem;margin-top:.65rem;font-size:12px}
.rs-ok{color:#1a7a45}.rs-ng{color:#b91c1c}.rs-to{color:#92400e}
.racts{display:flex;gap:7px;justify-content:center;margin-top:.9rem;flex-wrap:wrap}
.ra{padding:.48rem .9rem;border-radius:8px;border:1px solid #ddd;cursor:pointer;font-size:13px;font-family:inherit;background:#fff;color:#1a1a18}
.ra:hover{background:#f5f5f0}
.revhd{font-size:12px;font-weight:500;color:#888;margin:.5rem 0 .35rem}
.ritem{padding:.5rem 0;border-bottom:1px solid #f0f0ea;display:flex;align-items:flex-start;gap:8px;font-size:12px}
.ritem:last-child{border-bottom:none}
.riid{font-weight:500;color:#1a1a18;margin-bottom:1px}
.ri-ok{color:#1a7a45}.ri-ng{color:#b91c1c}
.stag{font-size:10px;padding:1px 6px;border-radius:7px;margin-left:4px;vertical-align:middle}
.stag-m{background:#edfaf3;color:#1a7a45}
.stag-c{background:#fef9ec;color:#92400e}
.stag-u{background:#f5f5f0;color:#888;border:1px solid #e5e5e0}

/* ── LOADING ── */
.loading{text-align:center;padding:2rem;font-size:13px;color:#aaa}
</style>
</head>
<body>
<div id="app">

<!-- LOGIN -->
<div id="pg-login" class="scr on">
  <div class="login-wrap">
    <h2>バスで覚える英熟語</h2>
    <p>氏名を入力してスタートしましょう</p>
    <div class="field">
      <label>クラス</label>
      <input type="text" id="inp-class" placeholder="例：3年A組" maxlength="20">
    </div>
    <div class="field">
      <label>氏名</label>
      <input type="text" id="inp-name" placeholder="例：山田 太郎" maxlength="20">
    </div>
    <button class="login-btn" onclick="doLogin()">スタート</button>
    <div class="login-err" id="login-err">クラスと氏名を入力してください</div>
  </div>
</div>

<!-- HOME -->
<div id="pg-home" class="scr">
  <div class="home-hd">
    <h1>バスで覚える英熟語</h1>
    <div class="student-name" id="student-name"></div>
    <div id="gbadge-wrap"></div>
  </div>
  <div class="sync-row">
    <button class="sync-btn" onclick="syncToServer()">↑ 進捗を送信</button>
    <span class="sync-status" id="sync-status"></span>
  </div>
  <div class="stage-list" id="stage-list"></div>
  <div id="final-area"></div>
</div>

<!-- STAGE -->
<div id="pg-stage" class="scr">
  <button class="back-btn" onclick="goHome()">← ステージ一覧</button>
  <div class="sv-hd"><h2 id="sv-title"></h2><p id="sv-desc"></p></div>
  <div class="cfg-row">
    <span class="cfg-lbl">⏱ 制限時間</span>
    <div class="seg" id="seg-t">
      <button class="sb" data-v="3" onclick="setTimer(3)">3秒</button>
      <button class="sb on" data-v="5" onclick="setTimer(5)">5秒</button>
      <button class="sb" data-v="7" onclick="setTimer(7)">7秒</button>
      <button class="sb" data-v="0" onclick="setTimer(0)">なし</button>
    </div>
  </div>
  <div class="cfg-row">
    <span class="cfg-lbl">📝 演習数</span>
    <div class="seg" id="seg-c">
      <button class="sb on" data-v="0" onclick="setCount(0)">全問</button>
      <button class="sb" data-v="10" onclick="setCount(10)">10問</button>
      <button class="sb" data-v="20" onclick="setCount(20)">20問</button>
    </div>
  </div>
  <div class="stat-row" id="stat-row"></div>
  <div class="mode-grid" id="mode-grid"></div>
  <div id="confirm-area"></div>
</div>

<!-- QUIZ -->
<div id="pg-quiz" class="scr">
  <button class="back-btn" id="qback">← 中断</button>
  <div class="qv-top">
    <span class="qv-info" id="qvinfo"></span>
    <div class="tw">
      <svg class="tring" viewBox="0 0 32 32" id="tsvg" style="display:none">
        <circle cx="16" cy="16" r="13" fill="none" stroke="#e8e8e2" stroke-width="3"/>
        <circle cx="16" cy="16" r="13" fill="none" stroke="#6366f1" stroke-width="3"
          stroke-dasharray="81.7" stroke-dashoffset="0" id="tarc" stroke-linecap="round"
          transform="rotate(-90 16 16)"/>
      </svg>
      <span class="tnum" id="tnum" style="display:none"></span>
    </div>
  </div>
  <div class="qbar"><div class="qbarf" id="qbarf"></div></div>
  <div class="qcard">
    <div class="qno" id="qno"></div>
    <div class="qidiom" id="qidiom"></div>
    <div class="qcat" id="qcat"></div>
  </div>
  <div class="choices" id="choices"></div>
  <div class="exbox" id="exbox"><div class="exen" id="exen"></div><div id="exjp"></div></div>
  <button class="nxtbtn" id="nxtbtn" onclick="nextQ()" disabled></button>
</div>

<!-- RESULT -->
<div id="pg-result" class="scr">
  <button class="back-btn" id="rbtn"></button>
  <div class="rcard">
    <div><span class="rbig" id="rsc"></span><span class="rden" id="rden"></span></div>
    <div class="rmsg" id="rmsg"></div>
    <div class="rstats"><span class="rs-ok" id="rsok"></span><span class="rs-ng" id="rsng"></span><span class="rs-to" id="rsto"></span></div>
    <div class="racts" id="racts"></div>
  </div>
  <div class="revhd">解答一覧</div>
  <div id="revlist"></div>
</div>

</div>
<script>

  {id:'s4',name:'ステージ４',sub:'修飾句 No.121〜170',  nos:rng(121,170)},
  {id:'s5',name:'ステージ５',sub:'論理表現 No.171〜200',nos:rng(171,200)},
];
function rng(a,b){const r=[];for(let i=a;i<=b;i++)r.push(i);return r}

// ── storage ──
const SK='bus_v4';
let ST={w:{},conf:{},fin:{}};
let studentName='', studentClass='';

function loadST(){
  try{
    const s=JSON.parse(localStorage.getItem(SK)||'{}');
    ST.w=s.w||{}; ST.conf=s.conf||{}; ST.fin=s.fin||{};
    studentName=s.name||''; studentClass=s.cls||'';
  }catch(e){}
}
function saveST(){
  try{localStorage.setItem(SK,JSON.stringify({...ST,name:studentName,cls:studentClass}));}catch(e){}
}
loadST();

function gw(n){if(!ST.w[n])ST.w[n]={k:0,s:'u'};return ST.w[n]}
function uw(n,ok){const w=gw(n);if(ok){w.k=(w.k||0)+1;w.s=w.k>=2?'m':'c';}else{w.k=0;w.s='u';}saveST();}

function stStat(sid){
  const nos=STAGES.find(s=>s.id===sid).nos;
  const m=nos.filter(n=>gw(n).s==='m').length;
  const c=nos.filter(n=>gw(n).s==='c').length;
  return{m,c,u:nos.length-m-c,tot:nos.length,pct:Math.round(m/nos.length*100)};
}
function allM(sid){const s=stStat(sid);return s.m===s.tot}
function unlocked(i){return i===0||!!ST.conf[STAGES[i-1].id]}
function allConf(){return STAGES.every(s=>ST.conf[s.id])}

// ── sync to Google Sheets ──
async function syncToServer(){
  if(!studentName){return}
  const el=document.getElementById('sync-status');
  el.textContent='送信中…';
  const payload={
    name: studentName,
    cls:  studentClass,
    ts:   new Date().toISOString(),
    s1pct: stStat('s1').pct, s1conf: ST.conf['s1']?1:0,
    s2pct: stStat('s2').pct, s2conf: ST.conf['s2']?1:0,
    s3pct: stStat('s3').pct, s3conf: ST.conf['s3']?1:0,
    s4pct: stStat('s4').pct, s4conf: ST.conf['s4']?1:0,
    s5pct: stStat('s5').pct, s5conf: ST.conf['s5']?1:0,
    totalMastered: D.filter(d=>gw(d[NO]).s==='m').length,
    fin1: ST.fin.p1?1:0,
    finPerfect: ST.fin.perfect?1:0,
  };
  try{
    await fetch(GAS_URL, {
      method:'POST',
      mode:'no-cors',
      headers:{'Content-Type':'application/json'},
      body: JSON.stringify(payload)
    });
    el.textContent='✓ 送信完了 '+new Date().toLocaleTimeString('ja-JP',{hour:'2-digit',minute:'2-digit'});
  }catch(e){
    el.textContent='送信失敗（オフライン？）';
  }
}

// auto-sync after confirm test & final test pass
function autoSync(){syncToServer()}

// ── app state ──
let timer=5, count=0, curSid=null;
let QQ=[],qi=0,sc=0,toC=0,log=[];
let isConf=false,isFin=false,isPerfect=false,confSid=null,backFn=null;
let th=null,tLeft=0;

function shuf(a){const b=[...a];for(let i=b.length-1;i>0;i--){const j=0|Math.random()*(i+1);[b[i],b[j]]=[b[j],b[i]]}return b}
function esc(s){return String(s).replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;').replace(/'/g,'&#39;').replace(/"/g,'&#34;')}
function pg(id){document.querySelectorAll('.scr').forEach(s=>s.classList.remove('on'));document.getElementById(id).classList.add('on')}
function setTimer(v){timer=v;document.querySelectorAll('#seg-t .sb').forEach(b=>b.classList.toggle('on',+b.dataset.v===v))}
function setCount(v){count=v;document.querySelectorAll('#seg-c .sb').forEach(b=>b.classList.toggle('on',+b.dataset.v===v))}

// ── login ──
function doLogin(){
  const cls=document.getElementById('inp-class').value.trim();
  const nm=document.getElementById('inp-name').value.trim();
  const err=document.getElementById('login-err');
  if(!cls||!nm){err.style.display='block';return}
  err.style.display='none';
  studentClass=cls; studentName=nm;
  saveST();
  goHome();
}
document.getElementById('inp-name').addEventListener('keydown',e=>{if(e.key==='Enter')doLogin()});

// ── home ──
function goHome(){
  clearTimeout(th);
  if(!studentName){pg('pg-login');return}
  pg('pg-home');
  document.getElementById('student-name').textContent=studentClass+' '+studentName;
  const fin=ST.fin;
  const gbw=document.getElementById('gbadge-wrap');
  if(fin.perfect) gbw.innerHTML=`<span class="gbadge gb2">🏆 完全修得達成！</span>`;
  else if(fin.p1){
    const d2=new Date(new Date(fin.p1).getTime()+2*864e5),now=new Date();
    if(now>=d2) gbw.innerHTML=`<span class="gbadge gb1">⭐ 修了済 — 最終テスト2回目受験可能</span>`;
    else{const df=Math.ceil((d2-now)/864e5);gbw.innerHTML=`<span class="gbadge gb1">⭐ 修了済 — 2回目まであと${df}日</span>`;}
  }else gbw.innerHTML='';

  document.getElementById('stage-list').innerHTML=STAGES.map((st,i)=>{
    const s=stStat(st.id),lk=!unlocked(i),cf=!!ST.conf[st.id];
    const icC=cf?'ic-done':lk?'ic-lock':'ic-act';
    const icH=cf?'✓':lk?'🔒':`${i+1}`;
    const tag=cf?`<span class="st-tag tag-m">修得</span>`:lk?'':s.m>0?`<span class="st-tag tag-p">学習中</span>`:`<span class="st-tag tag-u">未着手</span>`;
    return`<div class="strow${cf?' conf':''}${lk?' locked':''}" ${lk?'':('onclick="openStage(\''+st.id+'\')"')}>
      <div class="st-ic ${icC}">${icH}</div>
      <div class="st-bd">
        <div class="st-name">${st.name}</div>
        <div class="st-sub">${st.sub}</div>
        <div class="st-bar"><div class="st-fill" style="width:${s.pct}%"></div></div>
      </div>${tag}</div>`;
  }).join('');

  const fa=document.getElementById('final-area');
  if(!allConf()){fa.innerHTML='';return}
  let html='';
  if(!fin.p1){
    html=`<div class="fbox"><h3>🚩 修了判定テスト（1回目）</h3><p>全ステージ修得おめでとうございます！全200語からランダム50問。1問ミス以内で合格。</p><button class="fbtn" onclick="launchFinal(false)">受験する</button></div>`;
  }else if(!fin.perfect){
    const d2=new Date(new Date(fin.p1).getTime()+2*864e5),now=new Date();
    if(now>=d2){
      html=`<div class="fbox"><h3>🚩 修了判定テスト（2回目）</h3><p>全200語からランダム50問。1問ミス以内で完全修得認定。</p><button class="fbtn" onclick="launchFinal(true)">受験する</button></div>`;
    }else{
      const df=Math.ceil((d2-now)/864e5);
      html=`<div class="fbox" style="opacity:.7"><h3>⏳ 修了判定テスト（2回目）</h3><p>1回目合格！あと${df}日で受験できます。</p><button class="fbtn" disabled>あと${df}日</button></div>`;
    }
  }else{
    html=`<div class="fbox" style="border-color:#6ee7a0;background:#edfaf3"><h3 style="color:#1a7a45">🏆 完全修得達成！</h3><p>バスで覚える英熟語を完全修得しました！🎉</p></div>`;
  }
  fa.innerHTML=html;
}

// ── stage ──
function openStage(sid){
  curSid=sid;
  const st=STAGES.find(s=>s.id===sid);
  pg('pg-stage');
  document.getElementById('sv-title').textContent=st.name;
  document.getElementById('sv-desc').textContent=st.sub;
  const s=stStat(sid);
  document.getElementById('stat-row').innerHTML=
    `<span class="chip ch-m">修得 ${s.m}</span><span class="chip ch-c">点検中 ${s.c}</span><span class="chip ch-u">未修得 ${s.u}</span><span style="font-size:12px;color:#888;margin-left:2px">修得率 ${s.pct}%</span>`;
  document.getElementById('mode-grid').innerHTML=
    `<button class="mbtn" onclick="launchPractice('${sid}','all')"><div class="mb-t">全語演習</div><div class="mb-s">${st.nos.length}語</div></button>
     <button class="mbtn" ${s.u===0?'disabled':''} onclick="launchPractice('${sid}','u')"><div class="mb-t">未修得のみ</div><div class="mb-s">${s.u}語</div></button>
     <button class="mbtn" ${s.m===0?'disabled':''} onclick="launchPractice('${sid}','m')"><div class="mb-t">修得済みのみ</div><div class="mb-s">${s.m}語</div></button>`;
  const ca=document.getElementById('confirm-area');
  if(ST.conf[sid]){
    ca.innerHTML=`<div class="cbox" style="border-color:#6ee7a0;background:#edfaf3"><h4 style="color:#1a7a45">✓ ステージ修得済み</h4><p style="color:#1a7a45">確認テスト合格済みです。引き続き復習できます。</p></div>`;
  }else if(allM(sid)){
    ca.innerHTML=`<div class="cbox"><h4>📋 確認テスト受験可能</h4><p>全${st.nos.length}語を出題。1問ミス以内で合格・ステージ修得。</p><button class="cbtn" onclick="launchConfirm('${sid}')">確認テストを受験する</button></div>`;
  }else{
    ca.innerHTML=`<p style="font-size:12px;color:#aaa;margin-top:.25rem">修得率100%になると確認テストが受験できます</p>`;
  }
}

// ── launch ──
function launchPractice(sid,mode){
  const st=STAGES.find(s=>s.id===sid);
  let pool=st.nos.map(n=>byNo[n]);
  if(mode==='u')pool=pool.filter(d=>gw(d[NO]).s==='u');
  if(mode==='m')pool=pool.filter(d=>gw(d[NO]).s==='m');
  if(!pool.length)return;
  pool=['u','c','m'].flatMap(x=>shuf(pool.filter(d=>gw(d[NO]).s===x)));
  if(count>0)pool=pool.slice(0,count);
  isConf=false;isFin=false;isPerfect=false;confSid=null;backFn=()=>openStage(sid);
  startQ(pool);
}
function launchConfirm(sid){
  const pool=shuf(STAGES.find(s=>s.id===sid).nos.map(n=>byNo[n]));
  isConf=true;isFin=false;isPerfect=false;confSid=sid;backFn=()=>openStage(sid);
  startQ(pool);
}
function launchFinal(perf){
  const pool=shuf([...D]).slice(0,50);
  isConf=false;isFin=true;isPerfect=perf;confSid=null;backFn=()=>goHome();
  startQ(pool);
}

// ── quiz ──
function startQ(pool){
  QQ=pool;qi=0;sc=0;toC=0;log=[];
  document.getElementById('qback').onclick=()=>{clearTimeout(th);backFn()};
  pg('pg-quiz');renderQ();
}
function renderQ(){
  clearTimeout(th);
  const d=QQ[qi],tot=QQ.length;
  document.getElementById('qvinfo').textContent=`${qi+1} / ${tot}　正解 ${sc}`;
  document.getElementById('qbarf').style.width=`${Math.round(qi/tot*100)}%`;
  document.getElementById('qno').textContent=`No.${d[NO]}`;
  document.getElementById('qidiom').textContent=d[EN];
  document.getElementById('qcat').textContent=d[CAT];
  document.getElementById('exbox').style.display='none';
  document.getElementById('nxtbtn').disabled=true;
  document.getElementById('nxtbtn').textContent=qi+1<tot?'次の問題へ →':'結果を見る';
  const correct=d[JA];
  const opts=shuf([correct,...shuf(allJA.filter(j=>j!==correct)).slice(0,3)]);
  const L=['①','②','③','④'];
  document.getElementById('choices').innerHTML=opts.map((o,i)=>{
    const ev=esc(o),ec=esc(correct);
    return`<button class="cb" data-v="${ev}" onclick="ans(this,'${ev}','${ec}')"><span class="clbl">${L[i]}</span>${esc(o)}</button>`;
  }).join('');
  if(timer>0){
    const svg=document.getElementById('tsvg'),arc=document.getElementById('tarc'),num=document.getElementById('tnum');
    svg.style.display='';num.style.display='';
    tLeft=timer;num.textContent=tLeft;arc.style.strokeDashoffset='0';arc.style.stroke='#6366f1';
    const tick=()=>{tLeft--;num.textContent=tLeft;arc.style.strokeDashoffset=`${81.7*(1-tLeft/timer)}`;if(tLeft<=2)arc.style.stroke='#ef4444';if(tLeft<=0)onTO();else th=setTimeout(tick,1000);};
    th=setTimeout(tick,1000);
  }else{document.getElementById('tsvg').style.display='none';document.getElementById('tnum').style.display='none';}
}
function onTO(){
  clearTimeout(th);toC++;
  const d=QQ[qi];
  document.querySelectorAll('.cb').forEach(b=>{b.disabled=true;if(b.dataset.v===esc(d[JA]))b.classList.add('ok');else b.classList.add('to');});
  if(!isFin&&!isConf)uw(d[NO],false);
  log.push({e:d[EN],j:d[JA],ch:'⏱',ok:false,to:true,no:d[NO]});
  document.getElementById('exen').textContent=d[EX];
  document.getElementById('exjp').textContent=d[JX];
  document.getElementById('exbox').style.display='block';
  document.getElementById('nxtbtn').disabled=false;
}
function ans(btn,chosen,correct){
  clearTimeout(th);
  document.querySelectorAll('.cb').forEach(b=>b.disabled=true);
  const d=QQ[qi],ok=chosen===correct;
  btn.classList.add(ok?'ok':'ng');
  if(!ok)document.querySelectorAll('.cb').forEach(b=>{if(b.dataset.v===correct)b.classList.add('ok')});
  if(ok)sc++;
  if(!isFin&&!isConf)uw(d[NO],ok);
  log.push({e:d[EN],j:d[JA],ch:chosen,ok,to:false,no:d[NO]});
  document.getElementById('exen').textContent=d[EX];
  document.getElementById('exjp').textContent=d[JX];
  document.getElementById('exbox').style.display='block';
  document.getElementById('nxtbtn').disabled=false;
}
function nextQ(){qi++;if(qi>=QQ.length)showResult();else renderQ()}

// ── result ──
function showResult(){
  clearTimeout(th);pg('pg-result');
  const tot=QQ.length,miss=tot-sc,pct=Math.round(sc/tot*100);
  document.getElementById('rsc').textContent=sc;
  document.getElementById('rden').textContent=` / ${tot}`;
  document.getElementById('rsok').textContent=`✓ 正解 ${sc}`;
  document.getElementById('rsng').textContent=`✗ 不正解 ${miss-toC}`;
  document.getElementById('rsto').textContent=`⏱ 時間切れ ${toC}`;
  let msg='';
  if(isConf){
    if(miss<=1){ST.conf[confSid]=true;saveST();autoSync();msg=`🏆 合格！ステージを修得しました。（${miss}問ミス）`;}
    else msg=`不合格。${miss}問ミス。もう少し復習してから再挑戦しましょう。`;
  }else if(isFin){
    if(miss<=1){
      if(isPerfect){ST.fin.perfect=true;ST.fin.pd=new Date().toLocaleDateString('ja-JP');saveST();autoSync();msg='🎊 完全修得達成！おめでとうございます！';}
      else if(!ST.fin.p1){ST.fin.p1=new Date().toISOString();saveST();autoSync();msg=`🏅 1回目合格！（${miss}問ミス）2日後以降に2回目を受験できます。`;}
      else msg=`合格！（${miss}問ミス）`;
    }else msg=`不合格。${miss}問ミス。もう少し練習してから再挑戦しましょう。`;
  }else{
    msg=pct>=90?'素晴らしい！':pct>=70?'よくできました！':pct>=50?'もう少し！':'引き続き復習しましょう';
  }
  document.getElementById('rmsg').textContent=msg;
  document.getElementById('rbtn').textContent=`← ${isFin?'ホームへ':'ステージへ'}`;
  document.getElementById('rbtn').onclick=()=>{clearTimeout(th);backFn()};
  document.getElementById('racts').innerHTML=
    (!isFin?`<button class="ra" onclick="retry()">↺ もう一度</button>`:'')
    +`<button class="ra" onclick="backFn()">← ${isFin?'ホームへ':'ステージへ'}</button>`;
  document.getElementById('revlist').innerHTML=log.map(r=>{
    const ws=(!isFin&&!isConf)?gw(r.no).s:null;
    const stag=ws?`<span class="stag ${ws==='m'?'stag-m':ws==='c'?'stag-c':'stag-u'}">${ws==='m'?'修得':ws==='c'?'点検中':'未修得'}</span>`:'';
    return`<div class="ritem"><span style="font-size:14px;flex-shrink:0">${r.ok?'✅':r.to?'⏱':'❌'}</span>
      <div><div class="riid">${esc(r.e)}${stag}</div>
      ${r.ok?`<span class="ri-ok">${esc(r.j)}</span>`:`<span class="ri-ng">${esc(r.to?'時間切れ':r.ch)}</span> → <span class="ri-ok">${esc(r.j)}</span>`}
      </div></div>`;
  }).join('');
}
function retry(){qi=0;sc=0;toC=0;log=[];pg('pg-quiz');renderQ();}

// init
if(studentName) goHome(); else pg('pg-login');
</script>
